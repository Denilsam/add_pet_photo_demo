{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Pet - Pet Shop{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'petapp/css/pet.css' %}">
<link rel="stylesheet" href="{% static 'petapp/css/edit.css' %}">
{% endblock %}

{% block content %}
<header class="container"><h1>Edit Pet</h1></header>
<main class="container">
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {% if object.pet_image %}
    <div class="preview">
        <label>Current image:</label>
        <br>
        <img src="{{ object.pet_image.url }}" alt="{{ object.pet_name }}" width="240">
    </div>
    {% endif %}
    {{ form.as_p }}
    <button type="submit">Update</button>
</form>
</main>
{% endblock %}
